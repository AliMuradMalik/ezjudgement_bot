name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  # ─── Job 1: Secret scanning ───────────────────────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0              # full history scan, not just latest commit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── Job 2: Deploy ────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: gitleaks                   # blocks deploy if gitleaks job fails
    permissions:
      contents: read

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Deploy to EC2 ───────────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /${{ secrets.USER }}/TheBotss/EZjudgement_bot
            
            # ── Auth ───────────────────────────────────────────────────────
            git config --local credential.helper \
              '!f() { echo "username=x-access-token"; echo "password='"$GH_TOKEN"'"; }; f'

            # ── Pull latest ─────────────────────────────────────────────────
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # ── Install & build ─────────────────────────────────────────────
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install -r requirements.txt
            
            # ── Graceful restart ────────────────────────────────────────────
            pm2 reload EZjudge
            pm2 save
            # ── Cleanup ─────────────────────────────────────────────────────
            git config --local --unset credential.helper

            # ── Health check (no health endpoint)
            echo "Running health check..."
            MAX_RETRIES=4
            RETRY_INTERVAL=5
            HEALTH_URL="http://localhost:8000"

            for i in $(seq 1 $MAX_RETRIES); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")

              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i) — app is live"
                exit 0
              fi

              echo "Attempt $i/$MAX_RETRIES — got HTTP $STATUS, retrying in ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done

      # ─── 3. Notify on failure ──────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed on $(date -u). Check deploy logs."
